<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nintendo | Noticias Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body>
  <div class="app-container">
    <aside id="sidebar-placeholder" class="sidebar"></aside>

    <main class="main-content">
      <header class="topbar">
        <div class="flex items-center gap-6 flex-1 max-w-2xl">
          <div class="relative w-full group">
            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-red-500 transition-colors">🔍</span>
            <input type="text" id="global-search" placeholder="Buscar em Nintendo..." 
                   class="w-full bg-[#111] border border-white/5 rounded-2xl py-4 pl-14 pr-6 text-sm focus:bg-[#151515] focus:ring-4 focus:ring-red-500/20 transition-all">
          </div>
        </div>
        <div id="system-status"></div>
      </header>

      <div class="content-wrapper">
        <div class="bg-gradient-to-br from-red-600 to-rose-950 p-10 lg:p-16 rounded-[2.5rem] mb-12 relative overflow-hidden group shadow-2xl">
          <div class="relative z-10">
            <div class="flex items-center gap-4 mb-6">
              <span class="bg-white/20 backdrop-blur-md px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-[0.3em]">Hardware & Software</span>
            </div>
            <h1 class="text-5xl lg:text-8xl font-black text-white mb-4 tracking-tighter leading-none italic">NINTENDO <span class="opacity-30">OS</span></h1>
            <p class="text-white/70 font-bold uppercase tracking-[0.4em] text-xs max-w-lg">Monitoramento de Switch 2, Directs e franquias lendárias</p>
          </div>
          <div class="absolute right-[-40px] bottom-[-40px] text-[240px] opacity-10 group-hover:rotate-12 group-hover:scale-110 transition-all duration-1000 grayscale pointer-events-none">🎮</div>
        </div>

        <div class="flex items-center gap-3 mb-10 overflow-x-auto pb-4 no-scrollbar">
          <button class="bg-red-500 text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-red-500/20">Tudo</button>
          <button class="bg-white/5 text-gray-400 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-white/5 hover:bg-white/10 transition-all">Oficial</button>
          <button class="bg-white/5 text-gray-400 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-white/5 hover:bg-white/10 transition-all">Rumores</button>
          <button class="bg-white/5 text-gray-400 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-white/5 hover:bg-white/10 transition-all">Switch 2</button>
          <button class="bg-white/5 text-gray-400 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-white/5 hover:bg-white/10 transition-all">Pokemon</button>
        </div>
        
        <div id="news-container"></div>
      </div>

      <nav class="mobile-nav" id="mobile-nav-placeholder"></nav>
    </main>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/filters.js"></script>
  <script src="assets/js/render.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    // Injeção de UI Mobile Nav
    fetch('index.html').then(res => res.text()).then(html => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const mobileNav = doc.querySelector('.mobile-nav').innerHTML;
      document.getElementById('mobile-nav-placeholder').innerHTML = mobileNav;
      
      // Marcar link ativo mobile
      document.querySelectorAll('.mobile-nav a').forEach(link => {
        if (link.getAttribute('href') === 'nintendo.html') link.classList.add('active');
      });
    });
  </script>
</body>
</html>
