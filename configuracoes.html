<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajustes | Noticias Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body>
  <div class="app-container">
    <aside id="sidebar-placeholder" class="sidebar"></aside>
    <main class="main-content">
      <header class="topbar"></header>
      <div class="content-wrapper">
        <h1 class="text-3xl font-black mb-8 uppercase tracking-widest">Ajustes do Sistema</h1>
        <div class="max-w-2xl">
          <div class="glass-panel p-8 space-y-6">
            <div class="flex items-center justify-between">
              <div>
                <p class="font-bold">Modo Compacto</p>
                <p class="text-xs text-gray-500">Exibir cards menores na lista</p>
              </div>
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" class="sr-only peer">
                <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-red-500"></div>
              </label>
            </div>
            <div class="flex items-center justify-between">
              <div>
                <p class="font-bold">Tema Escuro</p>
                <p class="text-xs text-gray-500">Forçar modo noturno em todo o sistema</p>
              </div>
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" checked class="sr-only peer">
                <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-red-500"></div>
              </label>
            </div>
            <button class="w-full bg-red-500 hover:bg-red-600 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-red-500/20 active:scale-95">
              SALVAR CONFIGURAÇÕES
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/filters.js"></script>
  <script src="assets/js/render.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
