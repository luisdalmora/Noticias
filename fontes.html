<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fontes | Noticias Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body>
  <div class="app-container">
    <aside id="sidebar-placeholder" class="sidebar"></aside>

    <main class="main-content">
      <header class="topbar">
        <div id="system-status" class="ml-auto"></div>
      </header>

      <div class="content-wrapper">
        <div class="flex items-center gap-6 mb-12">
          <span class="w-2 h-12 bg-cyan-500 rounded-full shadow-lg shadow-cyan-500/40"></span>
          <h1 class="text-4xl font-black uppercase tracking-widest italic">Fontes <span class="text-cyan-500">Inteligentes</span></h1>
        </div>

        <div id="sources-container"></div>
      </div>

      <nav class="mobile-nav" id="mobile-nav-placeholder"></nav>
    </main>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/filters.js"></script>
  <script src="assets/js/render.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    fetch('index.html').then(res => res.text()).then(html => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const mobileNav = doc.querySelector('.mobile-nav').innerHTML;
      document.getElementById('mobile-nav-placeholder').innerHTML = mobileNav;
      document.querySelectorAll('.mobile-nav a').forEach(link => {
        if (link.getAttribute('href') === 'fontes.html') link.classList.add('active');
      });
    });
  </script>
</body>
</html>
