<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema | Noticias Premium</title>
  <link rel="stylesheet" href="/src/assets/css/input.css">
</head>
<body class="bg-console-dark">
  <div class="app-container">
    <aside id="sidebar" class="sidebar"></aside>
    <main id="main-content" class="main-content">
      <header id="topbar" class="topbar"></header>
      <div class="content-wrapper">
        <h1 class="text-3xl font-black mb-8 uppercase tracking-widest">Configurações do Sistema</h1>
        <div class="glass-panel p-8 max-w-2xl">
          <div class="space-y-6">
            <div class="flex items-center justify-between">
              <div>
                <p class="font-bold">Modo Compacto</p>
                <p class="text-xs text-console-secondary">Exibir cards menores na lista</p>
              </div>
              <input type="checkbox" class="w-12 h-6 bg-console-gray rounded-full appearance-none checked:bg-console-accent transition-all cursor-pointer">
            </div>
            <div class="flex items-center justify-between">
              <div>
                <p class="font-bold">Notificações</p>
                <p class="text-xs text-console-secondary">Alertar sobre notícias de alto impacto</p>
              </div>
              <input type="checkbox" checked class="w-12 h-6 bg-console-gray rounded-full appearance-none checked:bg-console-accent transition-all cursor-pointer">
            </div>
            <button class="console-button console-button-primary w-full justify-center">
              SALVAR PREFERÊNCIAS
            </button>
          </div>
        </div>
      </div>
      <nav id="mobile-nav" class="mobile-nav"></nav>
    </main>
  </div>
  <script type="module" src="/src/assets/js/app.js"></script>
</body>
</html>
