<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nintendo | Noticias Premium</title>
  <link rel="stylesheet" href="/src/assets/css/input.css">
</head>
<body class="bg-console-dark">
  <div class="app-container">
    <aside id="sidebar" class="sidebar"></aside>
    <main id="main-content" class="main-content">
      <header id="topbar" class="topbar"></header>
      <div class="content-wrapper">
        <section class="mb-10">
          <div class="bg-gradient-to-r from-red-600 to-rose-900 p-8 rounded-console mb-8 relative overflow-hidden group">
            <div class="relative z-10">
              <h1 class="text-4xl lg:text-6xl font-black text-white mb-2">NINTENDO <span class="opacity-50">OS</span></h1>
              <p class="text-white/80 font-bold uppercase tracking-widest text-xs">Switch, Rumores e Lançamentos Oficiais</p>
            </div>
            <div class="absolute right-[-20px] bottom-[-20px] text-[120px] opacity-10 group-hover:rotate-12 transition-transform duration-700">🎮</div>
          </div>

          <div class="flex items-center gap-4 mb-6 overflow-x-auto pb-2 no-scrollbar">
            <button class="bg-console-accent text-white px-5 py-2 rounded-full text-xs font-black uppercase">Tudo</button>
            <button class="bg-console-gray text-white/60 px-5 py-2 rounded-full text-xs font-black uppercase hover:bg-neutral-800">Oficial</button>
            <button class="bg-console-gray text-white/60 px-5 py-2 rounded-full text-xs font-black uppercase hover:bg-neutral-800">Rumores</button>
            <button class="bg-console-gray text-white/60 px-5 py-2 rounded-full text-xs font-black uppercase hover:bg-neutral-800">Switch 2</button>
          </div>
          
          <div id="news-container"></div>
        </section>
      </div>
      <nav id="mobile-nav" class="mobile-nav"></nav>
    </main>
  </div>
  <script type="module" src="/src/assets/js/app.js"></script>
</body>
</html>
