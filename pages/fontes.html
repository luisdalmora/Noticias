<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fontes | Noticias Premium</title>
  <link rel="stylesheet" href="/src/assets/css/input.css">
</head>
<body class="bg-console-dark">
  <div class="app-container">
    <aside id="sidebar" class="sidebar"></aside>
    <main id="main-content" class="main-content">
      <header id="topbar" class="topbar"></header>
      <div class="content-wrapper">
        <h1 class="text-3xl font-black mb-8 uppercase tracking-widest text-console-cyan">Fontes Monitoradas</h1>
        <div id="sources-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          <!-- Sample Source Card -->
          <div class="console-card">
            <div class="flex justify-between items-start mb-4">
              <span class="text-2xl">🌍</span>
              <span class="badge badge-official">Ativo</span>
            </div>
            <h3 class="font-bold mb-1">Nintendo Life</h3>
            <p class="text-xs text-console-secondary mb-4">Notícias oficiais e reviews da Nintendo.</p>
            <div class="flex justify-between items-center text-[10px] font-bold text-console-secondary">
              <span>RSS: OK</span>
              <span>Confiança: ALTA</span>
            </div>
          </div>
        </div>
      </div>
      <nav id="mobile-nav" class="mobile-nav"></nav>
    </main>
  </div>
  <script type="module" src="/src/assets/js/app.js"></script>
</body>
</html>
