<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noticias Premium | Dashboard</title>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="mb-10 flex items-center gap-3">
        <div class="w-10 h-10 bg-red-500 rounded-lg flex items-center justify-center shadow-lg shadow-red-500/20">
          <span class="text-white font-black text-xl">N</span>
        </div>
        <span class="text-xl font-black tracking-tighter">NOTICIAS<span class="text-red-500">PREMIUM</span></span>
      </div>

      <nav class="flex-1 flex flex-col gap-1">
        <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2 px-4">Menu</p>
        
        <a href="index.html" class="nav-link">
          <span>🏠</span>
          <span>Dashboard</span>
        </a>

        <a href="nintendo.html" class="nav-link">
          <span>🎮</span>
          <span>Nintendo</span>
        </a>

        <a href="samsung.html" class="nav-link">
          <span>📱</span>
          <span>Samsung</span>
        </a>

        <a href="rumores.html" class="nav-link">
          <span>🕵️</span>
          <span>Rumores</span>
        </a>

        <a href="historico.html" class="nav-link">
          <span>📚</span>
          <span>Histórico</span>
        </a>

        <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mt-8 mb-2 px-4">Sistema</p>

        <a href="fontes.html" class="nav-link">
          <span>🌐</span>
          <span>Fontes</span>
        </a>

        <a href="configuracoes.html" class="nav-link">
          <span>⚙️</span>
          <span>Ajustes</span>
        </a>
      </nav>

      <div class="mt-auto p-4 glass-panel text-[10px] text-gray-500 font-bold text-center">
        V 2.1.0 STATIC OS
      </div>
    </aside>

    <main class="main-content">
      <!-- Topbar -->
      <header class="topbar">
        <div class="flex items-center gap-4 flex-1 max-w-xl">
          <div class="relative w-full">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">🔍</span>
            <input type="text" id="global-search" placeholder="Buscar no sistema..." 
                   class="w-full bg-[#1a1a1a] border border-white/5 rounded-full py-2 pl-12 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-red-500/50 transition-all">
          </div>
        </div>
        
        <div class="flex items-center gap-4">
          <div class="hidden lg:flex items-center gap-3 bg-[#1a1a1a] px-4 py-1.5 rounded-full border border-white/5">
            <div class="w-6 h-6 bg-cyan-400 rounded-full flex items-center justify-center text-[10px] font-black text-black">OS</div>
            <span class="text-xs font-bold">Offline Mode</span>
          </div>
        </div>
      </header>

      <!-- Content -->
      <div class="content-wrapper">
        <section class="mb-10">
          <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-8 gap-4">
            <div class="animate-fade-in">
              <h1 class="text-3xl lg:text-5xl font-black mb-2">SISTEMA <span class="text-red-500">ONLINE</span></h1>
              <p class="text-gray-500 font-bold uppercase tracking-widest text-xs">Acesso total à central de inteligência gamer</p>
            </div>
          </div>

          <!-- Stats (rendered by JS) -->
          <div id="stats-container"></div>
        </section>

        <section>
          <div class="flex items-center gap-3 mb-6">
            <span class="w-1.5 h-6 bg-red-500 rounded-full"></span>
            <h2 class="text-xl font-black uppercase tracking-widest">Destaques do Dia</h2>
          </div>
          
          <div id="news-container">
            <!-- Loading Skeleton -->
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
              <div class="console-card h-80 skeleton"></div>
              <div class="console-card h-80 skeleton"></div>
              <div class="console-card h-80 skeleton"></div>
            </div>
          </div>
        </section>
      </div>

      <!-- Mobile Nav -->
      <nav class="mobile-nav">
        <a href="index.html" class="flex flex-col items-center gap-1 group">
          <span class="text-xl">🏠</span>
          <span class="text-[9px] font-bold text-gray-500 group-[.active]:text-red-500">Home</span>
        </a>
        <a href="nintendo.html" class="flex flex-col items-center gap-1 group">
          <span class="text-xl">🎮</span>
          <span class="text-[9px] font-bold text-gray-500">Nintendo</span>
        </a>
        <a href="samsung.html" class="flex flex-col items-center gap-1 group">
          <span class="text-xl">📱</span>
          <span class="text-[9px] font-bold text-gray-500">Samsung</span>
        </a>
        <a href="rumores.html" class="flex flex-col items-center gap-1 group">
          <span class="text-xl">🕵️</span>
          <span class="text-[9px] font-bold text-gray-500">Rumores</span>
        </a>
      </nav>
    </main>
  </div>

  <!-- Scripts -->
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/filters.js"></script>
  <script src="assets/js/render.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
