<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noticias Premium | OS Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="mb-12 flex items-center gap-4">
        <div class="w-12 h-12 bg-red-500 rounded-2xl flex items-center justify-center shadow-2xl shadow-red-500/40 transform -rotate-6">
          <span class="text-white font-black text-2xl">N</span>
        </div>
        <div class="flex flex-col">
          <span class="text-xl font-black tracking-tighter leading-none">NOTICIAS</span>
          <span class="text-red-500 font-black text-[10px] tracking-[0.3em] mt-1">PREMIUM OS</span>
        </div>
      </div>

      <nav class="flex-1 flex flex-col gap-2">
        <p class="text-[10px] font-black text-gray-600 uppercase tracking-[0.2em] mb-3 px-4">SISTEMA</p>
        
        <a href="index.html" class="nav-link">
          <span class="text-xl">🏠</span>
          <span>Dashboard</span>
        </a>

        <a href="nintendo.html" class="nav-link">
          <span class="text-xl">🎮</span>
          <span>Nintendo</span>
        </a>

        <a href="samsung.html" class="nav-link">
          <span class="text-xl">📱</span>
          <span>Samsung & Android</span>
        </a>

        <a href="rumores.html" class="nav-link">
          <span class="text-xl">🕵️</span>
          <span>Rumores</span>
        </a>

        <a href="historico.html" class="nav-link">
          <span class="text-xl">📚</span>
          <span>Histórico</span>
        </a>

        <p class="text-[10px] font-black text-gray-600 uppercase tracking-[0.2em] mt-10 mb-3 px-4">CONFIGURAÇÕES</p>

        <a href="fontes.html" class="nav-link">
          <span class="text-xl">🌐</span>
          <span>Fontes</span>
        </a>

        <a href="configuracoes.html" class="nav-link">
          <span class="text-xl">⚙️</span>
          <span>Ajustes</span>
        </a>
      </nav>

      <div class="mt-auto pt-6 border-t border-white/5">
        <div class="glass-panel p-4 text-center">
          <p id="app-version" class="text-[9px] font-black text-gray-500 tracking-widest mb-1 uppercase"></p>
          <p class="text-[8px] text-gray-600 font-bold">2026 DEEP ARCHITECTURE</p>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <!-- Topbar -->
      <header class="topbar">
        <div class="flex items-center gap-6 flex-1 max-w-2xl">
          <div class="relative w-full group">
            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-red-500 transition-colors">🔍</span>
            <input type="text" id="global-search" placeholder="Buscar no sistema..." 
                   class="w-full bg-[#111] border border-white/5 rounded-2xl py-4 pl-14 pr-6 text-sm focus:bg-[#151515] focus:ring-4 focus:ring-red-500/20 transition-all">
          </div>
        </div>
        
        <div class="flex items-center gap-4">
          <button id="btn-refresh" class="w-12 h-12 rounded-2xl bg-[#111] border border-white/5 flex items-center justify-center hover:bg-red-500/10 hover:border-red-500/30 transition-all active:scale-90" title="Atualizar Sistema">
            <span class="text-xl">🔄</span>
          </button>
          <div id="system-status"></div>
        </div>
      </header>

      <!-- Content -->
      <div class="content-wrapper">
        <section class="mb-14">
          <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-10 gap-6">
            <div class="animate-fade-in">
              <h1 class="text-4xl lg:text-7xl font-black mb-3 tracking-tighter uppercase italic">Central <span class="text-red-500">Hub</span></h1>
              <p class="text-gray-500 font-bold uppercase tracking-[0.3em] text-[10px]">Monitoramento global de hardware e software em tempo real</p>
            </div>
            <div id="stats-container" class="w-full lg:w-auto"></div>
          </div>
        </section>

        <section>
          <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-4">
              <span class="w-2 h-8 bg-red-500 rounded-full shadow-lg shadow-red-500/40"></span>
              <h2 class="text-2xl font-black uppercase tracking-widest italic">Destaques do Dia</h2>
            </div>
            <div class="flex gap-2">
              <span class="w-3 h-3 rounded-full bg-red-500"></span>
              <span class="w-3 h-3 rounded-full bg-gray-800"></span>
              <span class="w-3 h-3 rounded-full bg-gray-800"></span>
            </div>
          </div>
          
          <div id="news-container">
            <!-- Rendered by JS -->
          </div>
        </section>
      </div>

      <!-- Mobile Nav -->
      <nav class="mobile-nav">
        <a href="index.html" class="flex flex-col items-center gap-1 group">
          <span class="text-2xl">🏠</span>
          <span class="text-[8px] font-black uppercase tracking-widest text-gray-500 group-[.active]:text-red-500">Home</span>
        </a>
        <a href="nintendo.html" class="flex flex-col items-center gap-1 group">
          <span class="text-2xl">🎮</span>
          <span class="text-[8px] font-black uppercase tracking-widest text-gray-500 group-[.active]:text-red-500">Nintendo</span>
        </a>
        <a href="samsung.html" class="flex flex-col items-center gap-1 group">
          <span class="text-2xl">📱</span>
          <span class="text-[8px] font-black uppercase tracking-widest text-gray-500 group-[.active]:text-red-500">Samsung</span>
        </a>
        <a href="rumores.html" class="flex flex-col items-center gap-1 group">
          <span class="text-2xl">🕵️</span>
          <span class="text-[8px] font-black uppercase tracking-widest text-gray-500 group-[.active]:text-red-500">Rumores</span>
        </a>
        <a href="historico.html" class="flex flex-col items-center gap-1 group">
          <span class="text-2xl">📚</span>
          <span class="text-[8px] font-black uppercase tracking-widest text-gray-500 group-[.active]:text-red-500">Docs</span>
        </a>
      </nav>
    </main>
  </div>

  <!-- Scripts -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/filters.js"></script>
  <script src="assets/js/render.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
