<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rumores | Noticias Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body>
  <div class="app-container">
    <aside id="sidebar-placeholder" class="sidebar"></aside>

    <main class="main-content">
      <header class="topbar">
        <div class="flex items-center gap-6 flex-1 max-w-2xl">
          <div class="relative w-full group">
            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-yellow-500 transition-colors">🔍</span>
            <input type="text" id="global-search" placeholder="Buscar em Rumores..." 
                   class="w-full bg-[#111] border border-white/5 rounded-2xl py-4 pl-14 pr-6 text-sm focus:bg-[#151515] focus:ring-4 focus:ring-yellow-500/20 transition-all">
          </div>
        </div>
        <div id="system-status"></div>
      </header>

      <div class="content-wrapper">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-6">
          <div class="flex items-center gap-6">
            <span class="w-2 h-12 bg-yellow-500 rounded-full shadow-lg shadow-yellow-500/40"></span>
            <h1 class="text-4xl font-black uppercase tracking-widest italic">Central de <span class="text-yellow-500">Rumores</span></h1>
          </div>
          <div class="glass-panel px-6 py-3 border-yellow-500/20 bg-yellow-500/5 max-w-md">
            <p class="text-[10px] text-yellow-500 font-black uppercase tracking-widest mb-1">⚠️ AVISO DE CONFIABILIDADE</p>
            <p class="text-[9px] text-gray-500 font-bold leading-relaxed">Rumores não são confirmações oficiais. Verifique sempre a fonte original e o nível de confiança atribuído pela nossa IA.</p>
          </div>
        </div>
        
        <div id="news-container"></div>
      </div>

      <nav class="mobile-nav" id="mobile-nav-placeholder"></nav>
    </main>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/filters.js"></script>
  <script src="assets/js/render.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    fetch('index.html').then(res => res.text()).then(html => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const mobileNav = doc.querySelector('.mobile-nav').innerHTML;
      document.getElementById('mobile-nav-placeholder').innerHTML = mobileNav;
      document.querySelectorAll('.mobile-nav a').forEach(link => {
        if (link.getAttribute('href') === 'rumores.html') link.classList.add('active');
      });
    });
  </script>
</body>
</html>
